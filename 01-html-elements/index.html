<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            HTML Elements
        </title>
    </head>
    <body>
        <!--Headings-->
        <h1>Main heading</h1>
        <h2>For subtitles</h2>
        <h6>The smallest heading</h6>
        <!--Bold and italic elements-->
         <p>
            A <strong>Strong</strong> word,
            a <b>bold</b> word,
            an <em>emphasized</em> word,
            and an <i>italic</i> word.
        </p>

        <!--Links-->
        <p>    Visit    <a href="https://google.com" target="_blank">    Name of website "google"   </a>   </p>

        <!--List (Unordered and ordered lists)-->
        <ul>
            <li> First item </li>
            <li> Second item </li>
            <li> Third item </li>
        </ul>

        <ol>
            <li> First item </li>
            <li> Second item </li>
            <li> Third item </li>
        </ol>

        <!--Images-->
        <img src="https://static.nationalgeographicla.com/files/styles/image_3200/public/01-sloth-energy-nationalgeographic_1046424.webp?w=1600&h=900" height="250">

        <spam>Hello!</spam>
    </body>
</html>
